<!doctype html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><meta name="description" content="a Social Media cite that allows users to post images"/><meta name="author" content="Ramiro Millan"/><meta name="keywords" content="media, images, avatar, spots"/><link href="favicon.ico" rel="icon"/><title>Spots</title><script defer="defer" src="main.js"></script><link href="main.css" rel="stylesheet"></head><body><div class="page"><header class="header"><img class="header__logo" src="7fdef1c60650ea79ea97.svg" alt="Spot Logo"/></header><main class="content"><section class="profile"><div class="profile__content"><div class="profile__avatar-container"><button class="profile__avatar-button" id="profile__avatar-button"><img class="profile__pencil-icon" src="466fba40d06de23ed0a1.svg" alt="Pencil Icon"/></button> <img src="2fc47fd8e9a9bcd9612f.jpg" alt="Bessie Coleman" class="profile__avatar"/></div><div class="profile__column"><div class="profile__description"><h1 class="profile__name"></h1><p class="profile__job-title"></p></div><button type="button" class="profile__edit-button"><img src="1ecf96fab54a91c898b4.svg" alt="" class="profile__edit-button-icon"/>Edit Button</button></div></div><div class="profile__new-post-column"><button class="profile__new-post-button" type="button"><img src="40608da7369d39bc1077.svg" alt="" class="profile__plus-icon"/>New Post</button></div></section><section class="cards"><ul class="cards__list"><template id="card-template"><li class="card"><button class="card__delete-button" type="button"></button> <img src="#" alt="" class="card__image"/><div class="card__content"><h2 class="card__title"></h2><button class="card__like-button" type="button"></button></div></li></template></ul></section></main><footer class="footer"><p class="footer__copyright">2025 &#169; Spots</p></footer><div class="modal" id="edit-profile-modal"><div class="modal__container"><button class="modal__button-close"></button><h2 class="modal__title">Edit profile</h2><form class="modal__form"><label for="profile-name-input" class="modal__label">Name <input id="profile-name-input" class="modal__input" placeholder="Type your name" minlength="2" maxlength="40" required/> <span id="profile-name-input-error" class="modal__error"></span></label> <label for="profile-description-input" class="modal__label">Description <input id="profile-description-input" class="modal__input" placeholder="Describe yourself" minlength="2" maxlength="200" required/> <span id="profile-description-input-error" class="modal__error"></span></label> <button type="submit" id="profile-name-submit-button" class="modal__submit-button">Save</button></form></div></div><div class="modal" id="new-post-modal"><div class="modal__container"><button class="modal__button-close"></button><h2 class="modal__title">New Post</h2><form class="modal__form"><label for="new-post-url" class="modal__label">Image link <input id="new-post-url" type="url" class="modal__input" placeholder="Place a link to the picture" required/> <span id="new-post-url-error" class="modal__error"></span></label> <label for="new-post-caption" class="modal__label">Caption <input id="new-post-caption" class="modal__input" placeholder="Type your caption" minlength="2" maxlength="30" required/> <span id="new-post-caption-error" class="modal__error"></span></label> <button type="submit" id="new-post-submit-button" class="modal__submit-button">Save</button></form></div></div><div class="modal modal_type_preview" id="preview-modal"><div class="modal__container"><button class="modal__button-close modal__button-close_preview" aria-label="Close modal" type="button"></button> <img src="#" alt="" class="modal__image"/><p class="modal__caption"></p></div></div></div><div class="modal" id="avatar-modal"><div class="modal__container"><button class="modal__button-close"></button><h2 class="modal__title">Edit Avatar</h2><form class="modal__form" id="edit-avatar-form"><label for="profile-avatar-input" class="modal__label">Avatar <input id="profile-avatar-input" name="avatar" type="url" class="modal__input" placeholder="avatar goes here" required/> <span id="profile-avatar-input-error" class="modal__error"></span></label> <button type="submit" id="avatar-submit" class="modal__submit-button">Save</button></form></div></div><div class="modal" id="delete-modal"><div class="modal__container"><button class="modal__button-close"></button><h2 class="modal__title">Are you sure you want to delete this image?</h2><form class="modal__form" id="delete-form"><div class="modal__delete-button-layout"><button type="submit" class="modal__submit-button modal__submit-button_delete">Delete</button> <button type="button" class="modal__cancel-button">Cancle</button></div></form></div></div></body></html>
